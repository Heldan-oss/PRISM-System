name: Feature request
description: Propose a new feature or improvement for the PRISM RPG system for Foundry VTT
title: "[Feature]: "
labels:
  - "enhancement"
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for proposing an improvement to **PRISM RPG for Foundry Virtual Tabletop**.

        Use this form for new features, gameplay mechanics, interface improvements,
        documentation, localization, or other additions to the system.

        If an existing feature is not working as intended, use the **Bug report**
        form instead.

        > **Alpha notice**
        >
        > The system is currently in Alpha development. Features, priorities,
        > interfaces, and stored data may change as the project evolves.

  - type: markdown
    attributes:
      value: |
        ### Before continuing

        - Search existing open and closed Issues for similar proposals.
        - Describe the problem or gameplay need, not only the technical solution.
        - Do not include substantial copyrighted rules text, commercial assets,
          credentials, license keys, or private campaign data.
        - Security vulnerabilities must be reported privately according to
          `SECURITY.md`.

  - type: dropdown
    id: request_type
    attributes:
      label: Request type
      description: Which area best describes the proposed change?
      options:
        - "Gameplay mechanic"
        - "Anomaly sheet"
        - "Traits, Adversities, Signs, Fear, or Danger"
        - "Virtual bag or tag draw"
        - "Chat messages"
        - "User interface or styling"
        - "Accessibility"
        - "Localization or new language"
        - "Compendium or content support"
        - "Foundry VTT compatibility"
        - "Documentation"
        - "Development tooling or internal architecture"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Feature summary
      description: Briefly describe the proposed feature or improvement.
      placeholder: |
        Example: Add structured Signs associated with Traits and resolve them
        through a coin flip when the Trait is drawn.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: Explain the current limitation, missing mechanic, or difficult workflow.
      placeholder: |
        Example: Signs are currently represented by a free-text field and do not
        participate in tag draws or result resolution.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: Describe how the feature should work from the user's perspective.
      placeholder: |
        Example:
        1. A Sign can be associated with a Trait.
        2. When that Trait is drawn, the system flips a coin.
        3. Heads resolves the positive Trait.
        4. Tails resolves the associated Sign.
        5. The result is displayed in chat.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Suggested completion criteria
      description: Optional. List the conditions that would make the feature complete.
      placeholder: |
        - [ ] The feature works for new and existing Anomaly Actors.
        - [ ] English and Italian interface text is included.
        - [ ] The final result is displayed in chat.
        - [ ] Invalid states are handled safely.
    validations:
      required: false

  - type: textarea
    id: prism_context
    attributes:
      label: PRISM gameplay context
      description: Optional. Explain the relevant PRISM mechanic or gameplay context.
      placeholder: |
        Summarize the relevant mechanic without reproducing substantial portions
        of copyrighted rules text.
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Examples, screenshots, or mockups
      description: Optional. Add examples, sketches, screenshots, or workflow diagrams.
      placeholder: |
        Drag and drop supporting images or describe an example scenario.

        Remove private campaign data and unauthorized commercial content before
        uploading files.
    validations:
      required: false

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical notes
      description: Optional. Add implementation ideas, affected files, dependencies, or data considerations.
      placeholder: |
        Example:
        This may require replacing system.marks with structured Sign objects
        associated with Trait IDs.
    validations:
      required: false

  - type: dropdown
    id: contribution_intent
    attributes:
      label: Contribution availability
      description: Optional. Indicate whether you may be able to help.
      options:
        - "I would like to implement this feature"
        - "I can help test the feature"
        - "I can help with documentation or localization"
        - "I may contribute with maintainer guidance"
        - "I am only proposing the feature"
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Optional. Add related Issues, Discussions, limitations, or other useful information.
      placeholder: |
        Include links to related Issues, Discussions, Pull Requests, or relevant
        examples.
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Submission checklist
      options:
        - label: I searched existing open and closed Issues for similar proposals.
          required: true
        - label: This request describes a new feature or improvement, not a reproducible software bug.
          required: true
        - label: This request does not contain a security vulnerability.
          required: true
        - label: I removed credentials, private data, license keys, and unauthorized commercial content.
          required: true